<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Under the Starlit Sky — Where art meets aerospace</title>
<meta name="description" content="An illustrated journal at the meeting point of art and aerospace. Every post is a star; together they make a constellation." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Spectral:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  /* ============ TOKENS ============ */
  :root{
    --ink:#070C1C; --ink-2:#0C1430; --ink-3:#101B3B;
    --star:#ECE7D7; --haze:#8492AE; --cyan:#86ABD4;
    --brass:#D6AA5B; --brass-deep:#B4863A;
    --line:rgba(134,171,212,0.22); --line-soft:rgba(134,171,212,0.12);
    --display:"Cormorant Garamond",Georgia,serif;
    --body:"Spectral",Georgia,serif;
    --mono:"Space Mono",ui-monospace,monospace;
    --pad:clamp(1.25rem,5vw,6rem); --maxw:1240px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;-webkit-text-size-adjust:100%;}
  body{background:var(--ink);color:var(--star);font-family:var(--body);font-weight:300;
    line-height:1.6;font-size:clamp(1rem,0.55rem + 0.6vw,1.12rem);letter-spacing:0.005em;
    overflow-x:hidden;-webkit-font-smoothing:antialiased;}
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}
  ::selection{background:var(--brass);color:var(--ink);}
  button{font-family:inherit;}

  #sky{position:fixed;inset:0;z-index:0;pointer-events:none;
    background:radial-gradient(120% 90% at 50% -10%,#131f45 0%,#0a1024 42%,var(--ink) 78%);}
  .page{position:relative;z-index:1;}

  .eyebrow{font-family:var(--mono);font-size:0.7rem;letter-spacing:0.32em;
    text-transform:uppercase;color:var(--brass);}
  .coord{font-family:var(--mono);font-size:0.68rem;letter-spacing:0.12em;color:var(--haze);}
  .shell{max-width:var(--maxw);margin-inline:auto;padding-inline:var(--pad);}

  /* ---- the star hidden in the wordmark (dot of the i) ---- */
  .dot-i{position:relative;}
  .spark{position:absolute;left:50%;top:0.04em;width:0.4em;height:0.4em;
    transform:translate(-52%,-32%);pointer-events:none;
    animation:twinkle 3.4s ease-in-out infinite;}
  .spark svg{width:100%;height:100%;display:block;
    filter:drop-shadow(0 0 0.14em rgba(255,230,180,0.95));}
  .spark path{fill:var(--brass);}
  @keyframes twinkle{
    0%,100%{opacity:.4;transform:translate(-52%,-32%) scale(.72) rotate(0deg);}
    50%{opacity:1;transform:translate(-52%,-32%) scale(1.18) rotate(90deg);}
  }

  .rule{max-width:var(--maxw);margin:0 auto;padding-inline:var(--pad);
    display:flex;align-items:center;gap:1.1rem;}
  .rule__ticks{flex:1;height:26px;
    background-image:linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);
    background-size:100% 26px,13px 26px;background-position:bottom,bottom;
    -webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);
    mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);}
  .rule__label{white-space:nowrap;}

  /* ============ HEADER ============ */
  header{position:fixed;top:0;left:0;right:0;z-index:60;display:flex;align-items:center;
    justify-content:space-between;padding:1.15rem var(--pad);
    transition:padding .4s ease,background .4s ease,border-color .4s ease;
    border-bottom:1px solid transparent;}
  header.scrolled{padding-block:0.7rem;background:rgba(7,12,28,0.82);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--line-soft);}
  .brand__mark{font-family:var(--display);font-weight:500;font-size:1.5rem;
    letter-spacing:0.04em;line-height:1;color:var(--star);}
  .brand__mark em{color:var(--brass);font-style:italic;}
  nav{display:flex;align-items:center;gap:2rem;}
  .nav-links{display:flex;gap:1.8rem;}
  nav a{font-family:var(--mono);font-size:0.72rem;letter-spacing:0.16em;
    text-transform:uppercase;color:var(--haze);padding-bottom:2px;position:relative;
    transition:color .25s ease;}
  nav a::after{content:"";position:absolute;left:0;bottom:-2px;height:1px;width:0;
    background:var(--brass);transition:width .3s ease;}
  nav a:hover,nav a:focus-visible{color:var(--star);}
  nav a:hover::after,nav a:focus-visible::after{width:100%;}
  .menu-btn{display:none;background:none;border:1px solid var(--line);color:var(--star);
    font-family:var(--mono);font-size:0.68rem;letter-spacing:0.16em;text-transform:uppercase;
    padding:0.55rem 0.9rem;cursor:pointer;border-radius:2px;}

  /* ============ HERO ============ */
  .hero{position:relative;min-height:100svh;display:flex;align-items:flex-end;overflow:hidden;}
  .hero__img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
    object-position:50% 22%;opacity:0.9;}
  .hero__veil{position:absolute;inset:0;background:linear-gradient(180deg,
    rgba(7,12,28,0.35) 0%,rgba(7,12,28,0.05) 30%,rgba(7,12,28,0.72) 78%,var(--ink) 100%);}
  .hero__grid{position:absolute;inset:0;opacity:0.35;
    background-image:linear-gradient(var(--line-soft) 1px,transparent 1px),
      linear-gradient(90deg,var(--line-soft) 1px,transparent 1px);background-size:64px 64px;
    -webkit-mask-image:radial-gradient(120% 100% at 50% 20%,transparent 30%,#000 100%);
    mask-image:radial-gradient(120% 100% at 50% 20%,transparent 30%,#000 100%);}
  .hero__content{position:relative;z-index:2;width:100%;max-width:var(--maxw);
    margin-inline:auto;padding:0 var(--pad) clamp(3rem,8vh,7rem);}
  .hero__meta{display:flex;gap:1.5rem;flex-wrap:wrap;align-items:center;margin-bottom:1.6rem;}
  .hero h1{font-family:var(--display);font-weight:300;font-size:clamp(3.2rem,11vw,9.5rem);
    line-height:0.92;letter-spacing:-0.01em;text-wrap:balance;}
  .hero h1 em{font-style:italic;color:var(--brass);}
  .hero__slogan{font-family:var(--mono);font-size:clamp(0.8rem,1.6vw,1rem);letter-spacing:0.22em;
    text-transform:uppercase;color:var(--cyan);margin-top:1.7rem;display:flex;align-items:center;gap:0.9rem;}
  .hero__slogan::before{content:"";width:clamp(28px,6vw,64px);height:1px;background:var(--brass);}
  .scrollcue{position:absolute;z-index:2;left:50%;bottom:1.6rem;transform:translateX(-50%);
    font-family:var(--mono);font-size:0.62rem;letter-spacing:0.24em;text-transform:uppercase;
    color:var(--haze);display:flex;flex-direction:column;align-items:center;gap:0.5rem;}
  .scrollcue span{display:block;width:1px;height:38px;
    background:linear-gradient(var(--brass),transparent);animation:drop 2.4s ease-in-out infinite;}
  @keyframes drop{0%{transform:scaleY(0);transform-origin:top;opacity:0}
    40%{transform:scaleY(1);opacity:1}100%{transform:scaleY(1) translateY(38px);opacity:0}}

  /* ============ SECTION HEAD ============ */
  .sec-head{margin-bottom:2.6rem;}
  .sec-head h2{font-family:var(--display);font-weight:400;font-size:clamp(2rem,4.4vw,3.4rem);
    line-height:1;letter-spacing:-0.01em;margin-top:0.5rem;}

  /* ============ VEHICLE / ROCKET ============ */
  .vehicle{padding:clamp(4rem,10vh,8rem) 0;}
  .vehicle__inner{display:grid;grid-template-columns:0.95fr 1.05fr;gap:clamp(2rem,5vw,5rem);
    align-items:center;}
  .rocket-wrap{display:flex;justify-content:center;}
  .rocket-svg{width:100%;max-width:420px;height:auto;max-height:70vh;}
  .rocket-svg .cut{fill:none;stroke:var(--cyan);stroke-width:1.4;}
  .rocket-svg .thin{fill:none;stroke:var(--line);stroke-width:1;}
  .rocket-svg .hair{fill:none;stroke:var(--line-soft);stroke-width:1;}
  .rocket-svg .fillp{fill:rgba(134,171,212,0.06);stroke:var(--cyan);stroke-width:1.4;}
  .rocket-svg .brassf{fill:none;stroke:var(--brass);stroke-width:1.6;}
  .rocket-svg .dot{fill:var(--cyan);}
  .rocket-svg .lbl{fill:var(--star);font-family:var(--mono);font-size:11px;letter-spacing:1px;}
  .rocket-svg .lblsm{fill:var(--haze);font-family:var(--mono);font-size:8.5px;letter-spacing:1px;}
  .rocket-svg .lead{stroke:var(--line);stroke-width:1;fill:none;}
  .rocket-svg .brasslbl{fill:var(--brass);font-family:var(--mono);font-size:11px;letter-spacing:1px;}
  .vehicle__text h2{font-family:var(--display);font-weight:400;font-size:clamp(2rem,4vw,3.2rem);
    line-height:1.02;margin:0.7rem 0 1.1rem;letter-spacing:-0.005em;}
  .vehicle__text p{color:#cfd3e0;max-width:46ch;}
  .spec{margin-top:2rem;border-top:1px solid var(--line-soft);}
  .spec div{display:flex;justify-content:space-between;padding:0.75rem 0;
    border-bottom:1px solid var(--line-soft);font-family:var(--mono);font-size:0.72rem;
    letter-spacing:0.08em;color:var(--haze);}
  .spec div b{color:var(--star);font-weight:400;}

  /* ============ STAR CHART ============ */
  .chart{padding:clamp(3rem,8vh,6rem) 0 clamp(4rem,10vh,7rem);}
  .chart__grid{display:grid;grid-template-columns:1fr;gap:clamp(2rem,4vw,3.5rem);
    align-items:stretch;}
  .chart__map{position:relative;border:1px solid var(--line);background:
    radial-gradient(120% 120% at 50% 20%,rgba(19,31,69,0.55),rgba(7,12,28,0.2));
    border-radius:3px;overflow:hidden;min-height:500px;}
  .chart__map svg{width:100%;height:100%;display:block;}
  .chart__hint{position:absolute;left:1rem;bottom:0.9rem;font-family:var(--mono);
    font-size:0.62rem;letter-spacing:0.12em;color:var(--haze);pointer-events:none;}
  .chart__count{position:absolute;right:1rem;top:0.9rem;font-family:var(--mono);
    font-size:0.62rem;letter-spacing:0.14em;color:var(--brass);pointer-events:none;}
  .clink{stroke:var(--line);stroke-width:1;}
  .clink.new{animation:draw 1.1s ease forwards;}
  .node{cursor:pointer;transform-box:fill-box;transform-origin:center;
    transition:transform .3s cubic-bezier(.2,.7,.2,1);outline:none;}
  .node .glow{fill:var(--cyan);opacity:0.14;}
  .node .core{fill:var(--star);}
  .node.newest .core{fill:var(--brass);}
  .node.newest .glow{fill:var(--brass);opacity:0.2;}
  .node .label{fill:var(--star);font-family:var(--mono);font-size:12px;letter-spacing:0.5px;
    opacity:0;transition:opacity .25s ease;text-anchor:middle;pointer-events:none;}
  .node .num{fill:var(--haze);font-family:var(--mono);font-size:8px;pointer-events:none;text-anchor:middle;}
  .node:hover,.node:focus-visible{transform:scale(1.5);}
  .node:hover .label,.node:focus-visible .label{opacity:1;}
  .node:focus-visible .core{stroke:var(--brass);stroke-width:1.5;}
  .node.spawn{animation:pop .8s cubic-bezier(.2,.9,.3,1.2);}
  @keyframes pop{0%{transform:scale(0);opacity:0}60%{transform:scale(1.7)}100%{transform:scale(1)}}
  @keyframes draw{from{stroke-dashoffset:var(--len)}to{stroke-dashoffset:0}}

  /* ============ FEATURED ============ */
  .featured{padding:clamp(3rem,8vh,7rem) 0;}
  .featured__inner{display:grid;grid-template-columns:1.05fr 0.95fr;gap:clamp(2rem,5vw,5rem);align-items:center;}
  .featured__figure{position:relative;}
  .featured__figure img{width:100%;aspect-ratio:4/5;object-fit:cover;border:1px solid var(--line);}
  .featured__figure .frameline{position:absolute;inset:12px;border:1px solid var(--line-soft);pointer-events:none;}
  .featured__figure figcaption{position:absolute;left:0;bottom:-1.9rem;font-family:var(--mono);
    font-size:0.64rem;letter-spacing:0.14em;color:var(--haze);}
  .tag{display:inline-block;font-family:var(--mono);font-size:0.64rem;letter-spacing:0.2em;
    text-transform:uppercase;color:var(--brass);border:1px solid var(--line);padding:0.35rem 0.7rem;border-radius:2px;}
  .featured h2{font-family:var(--display);font-weight:400;font-size:clamp(2.4rem,4.6vw,4rem);
    line-height:1.02;margin:1.4rem 0 1.1rem;letter-spacing:-0.005em;text-wrap:balance;}
  .featured p{color:#cfd3e0;max-width:46ch;}
  .read{display:inline-flex;align-items:center;gap:0.7rem;margin-top:1.8rem;font-family:var(--mono);
    font-size:0.72rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--star);
    border:none;border-bottom:1px solid var(--brass);padding-bottom:0.4rem;cursor:pointer;background:none;
    transition:gap .3s ease,color .3s ease;}
  .read:hover,.read:focus-visible{gap:1.3rem;color:var(--brass);}
  .read__by{display:flex;gap:1.2rem;align-items:center;margin-top:2rem;color:var(--haze);
    font-family:var(--mono);font-size:0.66rem;letter-spacing:0.1em;}

  /* ============ JOURNAL GRID ============ */
  .journal{padding:clamp(2rem,5vh,4rem) 0 clamp(4rem,10vh,8rem);}
  .journal__head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;
    gap:1rem;margin-bottom:2.6rem;}
  .journal__head h2{font-family:var(--display);font-weight:400;font-size:clamp(2rem,4vw,3.2rem);
    line-height:1;letter-spacing:-0.01em;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line-soft);
    border:1px solid var(--line-soft);}
  .card{background:var(--ink);padding:1.9rem 1.7rem 2.1rem;display:flex;flex-direction:column;
    min-height:320px;transition:background .4s ease;position:relative;overflow:hidden;cursor:pointer;
    text-align:left;border:none;color:inherit;width:100%;}
  .card::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:var(--brass);
    transform:scaleX(0);transform-origin:left;transition:transform .45s cubic-bezier(.2,.7,.2,1);}
  .card:hover{background:var(--ink-2);}
  .card:hover::before,.card:focus-visible::before{transform:scaleX(1);}
  .card__top{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.4rem;}
